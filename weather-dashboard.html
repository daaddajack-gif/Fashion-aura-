<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }

        header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .search-box {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .search-box input {
            padding: 12px 20px;
            border: none;
            border-radius: 25px;
            width: 300px;
            font-size: 1em;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        .search-box button {
            padding: 12px 30px;
            background: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-weight: bold;
            color: #667eea;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            transition: all 0.3s ease;
        }

        .search-box button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0,0,0,0.3);
        }

        .weather-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .weather-card {
            background: white;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.1);
            transition: all 0.3s ease;
        }

        .weather-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 40px rgba(0,0,0,0.15);
        }

        .city-name {
            font-size: 1.8em;
            font-weight: bold;
            color: #333;
            margin-bottom: 10px;
        }

        .country {
            color: #999;
            font-size: 0.9em;
            margin-bottom: 15px;
        }

        .temperature {
            font-size: 3em;
            font-weight: bold;
            color: #667eea;
            margin-bottom: 10px;
        }

        .weather-description {
            font-size: 1.1em;
            color: #666;
            text-transform: capitalize;
            margin-bottom: 15px;
        }

        .weather-icon {
            font-size: 4em;
            margin: 15px 0;
        }

        .weather-details {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #eee;
        }

        .detail {
            display: flex;
            flex-direction: column;
        }

        .detail-label {
            font-size: 0.85em;
            color: #999;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 5px;
        }

        .detail-value {
            font-size: 1.3em;
            font-weight: bold;
            color: #333;
        }

        .forecast-section {
            background: white;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.1);
        }

        .forecast-title {
            font-size: 1.5em;
            font-weight: bold;
            color: #333;
            margin-bottom: 20px;
        }

        .forecast-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 15px;
        }

        .forecast-item {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px;
            border-radius: 10px;
            text-align: center;
        }

        .forecast-day {
            font-weight: bold;
            margin-bottom: 10px;
            font-size: 0.95em;
        }

        .forecast-icon {
            font-size: 2.5em;
            margin: 10px 0;
        }

        .forecast-temp {
            font-size: 0.9em;
        }

        .forecast-desc {
            font-size: 0.8em;
            opacity: 0.9;
            margin-top: 5px;
        }

        .error-message {
            background: #ff6b6b;
            color: white;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            display: none;
        }

        .loading {
            text-align: center;
            color: white;
            font-size: 1.2em;
            display: none;
        }

        .spinner {
            border: 4px solid rgba(255,255,255,0.3);
            border-top: 4px solid white;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .recent-searches {
            color: white;
            margin-top: 20px;
            text-align: center;
        }

        .recent-searches p {
            margin-bottom: 10px;
            font-size: 0.9em;
        }

        .recent-btn {
            background: rgba(255,255,255,0.2);
            color: white;
            border: 1px solid white;
            padding: 8px 15px;
            border-radius: 20px;
            margin: 5px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 0.85em;
        }

        .recent-btn:hover {
            background: white;
            color: #667eea;
        }

        @media (max-width: 768px) {
            header h1 {
                font-size: 1.8em;
            }

            .search-box input {
                width: 100%;
            }

            .temperature {
                font-size: 2.2em;
            }

            .weather-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🌤️ Weather Dashboard</h1>
            <p>Check the weather anywhere in the world</p>
        </header>

        <div class="search-box">
            <input 
                type="text" 
                id="searchInput" 
                placeholder="Enter city name..."
                autocomplete="off"
            >
            <button onclick="searchWeather()">Search</button>
            <button onclick="getLocationWeather()">📍 Current Location</button>
        </div>

        <div class="error-message" id="errorMessage"></div>
        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p>Fetching weather data...</p>
        </div>

        <div class="weather-grid" id="weatherGrid"></div>

        <div class="forecast-section" id="forecastSection" style="display: none;">
            <div class="forecast-title">5-Day Forecast</div>
            <div class="forecast-grid" id="forecastGrid"></div>
        </div>

        <div class="recent-searches" id="recentSearches"></div>
    </div>

    <script>
        const API_KEY = 'b6fd43b1b16b40e7ba5215317242206'; // WeatherAPI.com free API
        const API_BASE = 'https://api.weatherapi.com/v1';
        let recentSearches = JSON.parse(localStorage.getItem('recentSearches')) || [];

        // Weather icon mapping
        const iconMap = {
            'Sunny': '☀️',
            'Clear': '🌙',
            'Cloudy': '☁️',
            'Overcast': '☁️',
            'Mist': '🌫️',
            'Patchy rain': '🌧️',
            'Light rain': '🌧️',
            'Moderate rain': '🌧️',
            'Heavy rain': '⛈️',
            'Thundery': '⛈️',
            'Sleet': '🌨️',
            'Snow': '❄️',
            'Partly cloudy': '⛅',
            'Rainy': '🌧️',
            'Snowy': '❄️'
        };

        function getWeatherIcon(description) {
            for (let key in iconMap) {
                if (description.includes(key)) {
                    return iconMap[key];
                }
            }
            return '🌤️';
        }

        function showError(message) {
            const errorEl = document.getElementById('errorMessage');
            errorEl.textContent = message;
            errorEl.style.display = 'block';
            setTimeout(() => {
                errorEl.style.display = 'none';
            }, 5000);
        }

        function showLoading(show) {
            document.getElementById('loading').style.display = show ? 'block' : 'none';
        }

        async function fetchWeather(city) {
            try {
                showLoading(true);
                const response = await fetch(
                    `${API_BASE}/current.json?key=${API_KEY}&q=${city}&aqi=yes`
                );
                
                if (!response.ok) {
                    throw new Error('City not found');
                }

                const data = await response.json();
                return data;
            } catch (error) {
                showError('Error: ' + error.message);
                return null;
            } finally {
                showLoading(false);
            }
        }

        async function fetchForecast(city) {
            try {
                const response = await fetch(
                    `${API_BASE}/forecast.json?key=${API_KEY}&q=${city}&days=5&aqi=yes`
                );
                
                if (!response.ok) {
                    throw new Error('Forecast not available');
                }

                const data = await response.json();
                return data;
            } catch (error) {
                console.error('Forecast error:', error);
                return null;
            }
        }

        function displayWeather(data) {
            const grid = document.getElementById('weatherGrid');
            const current = data.current;
            const location = data.location;

            const weatherCard = `
                <div class="weather-card">
                    <div class="city-name">${location.name}</div>
                    <div class="country">${location.region}, ${location.country}</div>
                    <div class="weather-icon">${getWeatherIcon(current.condition.text)}</div>
                    <div class="temperature">${Math.round(current.temp_c)}°C</div>
                    <div class="weather-description">${current.condition.text}</div>
                    
                    <div class="weather-details">
                        <div class="detail">
                            <div class="detail-label">Feels Like</div>
                            <div class="detail-value">${Math.round(current.feelslike_c)}°C</div>
                        </div>
                        <div class="detail">
                            <div class="detail-label">Humidity</div>
                            <div class="detail-value">${current.humidity}%</div>
                        </div>
                        <div class="detail">
                            <div class="detail-label">Wind Speed</div>
                            <div class="detail-value">${Math.round(current.wind_kph)} km/h</div>
                        </div>
                        <div class="detail">
                            <div class="detail-label">Pressure</div>
                            <div class="detail-value">${current.pressure_mb} mb</div>
                        </div>
                        <div class="detail">
                            <div class="detail-label">Visibility</div>
                            <div class="detail-value">${current.vis_km} km</div>
                        </div>
                        <div class="detail">
                            <div class="detail-label">UV Index</div>
                            <div class="detail-value">${current.uv}</div>
                        </div>
                    </div>
                </div>
            `;

            grid.innerHTML = weatherCard;
        }

        function displayForecast(data) {
            const forecastGrid = document.getElementById('forecastGrid');
            const forecastSection = document.getElementById('forecastSection');
            const forecastDays = data.forecast.forecastday;

            let forecastHTML = '';
            forecastDays.forEach((day, index) => {
                const date = new Date(day.date);
                const dayName = index === 0 ? 'Today' : date.toLocaleDateString('en-US', { weekday: 'short' });
                
                forecastHTML += `
                    <div class="forecast-item">
                        <div class="forecast-day">${dayName}</div>
                        <div class="forecast-icon">${getWeatherIcon(day.day.condition.text)}</div>
                        <div class="forecast-temp">
                            ${Math.round(day.day.maxtemp_c)}° / ${Math.round(day.day.mintemp_c)}°
                        </div>
                        <div class="forecast-desc">${day.day.condition.text}</div>
                    </div>
                `;
            });

            forecastGrid.innerHTML = forecastHTML;
            forecastSection.style.display = 'block';
        }

        function addToRecentSearches(city) {
            recentSearches = recentSearches.filter(c => c.toLowerCase() !== city.toLowerCase());
            recentSearches.unshift(city);
            recentSearches = recentSearches.slice(0, 5);
            localStorage.setItem('recentSearches', JSON.stringify(recentSearches));
            displayRecentSearches();
        }

        function displayRecentSearches() {
            const container = document.getElementById('recentSearches');
            if (recentSearches.length === 0) {
                container.innerHTML = '';
                return;
            }

            let html = '<p>Recent Searches:</p>';
            recentSearches.forEach(city => {
                html += `<button class="recent-btn" onclick="searchWeatherByCity('${city}')">${city}</button>`;
            });
            container.innerHTML = html;
        }

        async function searchWeatherByCity(city) {
            if (!city.trim()) {
                showError('Please enter a city name');
                return;
            }

            const weatherData = await fetchWeather(city);
            if (weatherData) {
                displayWeather(weatherData);
                addToRecentSearches(city);

                const forecastData = await fetchForecast(city);
                if (forecastData) {
                    displayForecast(forecastData);
                }
            }
        }

        function searchWeather() {
            const input = document.getElementById('searchInput');
            const city = input.value.trim();
            input.value = '';
            searchWeatherByCity(city);
        }

        function getLocationWeather() {
            if (navigator.geolocation) {
                showLoading(true);
                navigator.geolocation.getCurrentPosition(
                    async (position) => {
                        const { latitude, longitude } = position.coords;
                        try {
                            const response = await fetch(
                                `${API_BASE}/current.json?key=${API_KEY}&q=${latitude},${longitude}&aqi=yes`
                            );
                            const data = await response.json();
                            displayWeather(data);
                            addToRecentSearches(data.location.name);

                            const forecastData = await fetchForecast(`${latitude},${longitude}`);
                            if (forecastData) {
                                displayForecast(forecastData);
                            }
                        } catch (error) {
                            showError('Error fetching location weather');
                        } finally {
                            showLoading(false);
                        }
                    },
                    (error) => {
                        showLoading(false);
                        showError('Location access denied. Please search manually.');
                    }
                );
            } else {
                showError('Geolocation not supported by your browser');
            }
        }

        // Allow Enter key to search
        document.getElementById('searchInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                searchWeather();
            }
        });

        // Load default city on page load
        window.addEventListener('load', () => {
            displayRecentSearches();
            searchWeatherByCity('London');
        });
    </script>
</body>
</html>
